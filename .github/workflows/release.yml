name: Release
on:
  push: {tags: ['v*']}
  workflow_dispatch:
permissions: {contents: write}
jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: {python-version: '3.12', cache: pip}
      - run: pip install -e ".[dev]"
      - name: Read package version
        id: package
        shell: pwsh
        run: |
          $version = python -c "from cleantext_studio import __version__; print(__version__)"
          "version=$version" >> $env:GITHUB_OUTPUT
      - name: Verify tag version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = python -c "from cleantext_studio import __version__; print(__version__)"
          if ("v$version" -ne "${{ github.ref_name }}") { throw "Tag and package version differ" }
      - run: choco install innosetup -y
      - run: ruff check .
      - run: mypy src
      - run: pytest --cov=cleantext_studio.cleaners --cov=cleantext_studio.math --cov-report=term --cov-fail-under=90
        env: {QT_QPA_PLATFORM: offscreen}
      - shell: pwsh
        run: ./scripts/build_windows.ps1 -SkipChecks
      - name: Verify release assets
        shell: pwsh
        run: |
          $version = python -c "from cleantext_studio import __version__; print(__version__)"
          @("Portable.zip", "Setup.exe") | ForEach-Object {
            if (!(Test-Path "dist/release/CleanText-Studio-v$version-Windows-x64-$_")) { throw "Missing $_" }
          }
          if (!(Test-Path "dist/release/SHA256SUMS.txt")) { throw "Missing SHA256SUMS.txt" }
          $process = Start-Process 'dist/CleanText Studio/CleanText Studio.exe' -PassThru
          Start-Sleep -Seconds 5
          if ($process.HasExited) { throw "Packaged application exited unexpectedly" }
          Stop-Process -Id $process.Id
      - uses: actions/upload-artifact@v4
        with: {name: windows-release, path: dist/release/*}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package.outputs.version }}
          files: 'dist/release/*'
          generate_release_notes: true
