name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12', cache: pip}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy src
      - run: pytest --junitxml=test-results.xml --cov=cleantext_studio.cleaners --cov=cleantext_studio.math --cov-report=term --cov-fail-under=90
        env: {QT_QPA_PLATFORM: offscreen}
      - name: Verify DOCX structure export
        run: pytest -o addopts='' tests/integration/test_docx_structure_export.py tests/unit/tables/test_table_docx_renderer.py tests/integration/test_math_docx_export.py tests/unit/math/test_omml_converter.py
      - name: Secret pattern scan
        shell: pwsh
        run: |
          $hits = git grep -n -E '(sk-[A-Za-z0-9]{20,}|api[_-]?key\s*[:=]\s*["''][^"'']+)' -- ':!*.md'
          if ($LASTEXITCODE -gt 1) { throw "git grep failed" }
          if ($hits) { $hits; exit 1 }
          exit 0
      - name: Windows package build
        shell: pwsh
        run: ./scripts/build_windows.ps1 -SkipChecks
      - name: Verify packaged application
        shell: pwsh
        run: |
          if (!(Test-Path 'dist/CleanText Studio/_internal/PySide6/plugins/platforms/qwindows.dll')) { exit 1 }
          $version = python -c "from cleantext_studio import __version__; print(__version__)"
          if (!(Test-Path "dist/release/CleanText-Studio-v$version-Windows-x64-Portable.zip")) { exit 1 }
          $process = Start-Process 'dist/CleanText Studio/CleanText Studio.exe' -PassThru
          Start-Sleep -Seconds 5
          if ($process.HasExited) { throw "Packaged application exited unexpectedly" }
          Stop-Process -Id $process.Id
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: test-results, path: test-results.xml}
