name: Feature request
description: Propose a focused improvement that fits CleanText Studio’s local-first scope.
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the workflow problem, not only a proposed implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope acknowledgement
      options:
        - label: "This request is compatible with the documented local-processing and privacy principles."
          required: true
